  <style>
    :root {
      --app-bg: #eef2f6;
      --chrome-bg: rgba(255, 255, 255, 0.92);
      --chrome-line: rgba(34, 68, 102, 0.12);
      --chrome-text: #334155;
      --chrome-muted: #64748b;
    }

    * { box-sizing: border-box; }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(34, 68, 102, 0.08), transparent 32%),
        linear-gradient(180deg, #f8fafc 0%, var(--app-bg) 100%);
      color: #111827;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .bespoke-marp-osc,
    .bespoke-progress-parent,
    .bespoke-marp-note {
      display: none !important;
    }

    .app {
      height: 100%;
      display: grid;
      grid-template-rows: 1fr auto;
    }

    .viewer {
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px 24px 10px;
    }

    .stage {
      position: relative;
      width: min(95vw, calc((100vh - 104px) * 16 / 9));
      aspect-ratio: 16 / 9;
      background: #ffffff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow:
        0 16px 40px rgba(15, 23, 42, 0.12),
        0 2px 10px rgba(15, 23, 42, 0.08);
    }

    .marp-layer {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: #fff;
      pointer-events: none;
    }

    .marp-layer > div {
      width: 100%;
      height: 100%;
    }

    .marp-layer > div > svg {
      display: block;
      width: 100%;
      height: 100%;
      background: #fff;
    }

    .media-layer {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    .overlay-shell,
    .overlay-link {
      position: absolute;
      display: block;
      overflow: hidden;
    }

    .overlay-shell-image {
      background: #fff;
      border-radius: 0;
      box-shadow:
        0 24px 36px rgba(15, 23, 42, 0.18),
        0 10px 16px rgba(15, 23, 42, 0.12),
        0 1px 2px rgba(15, 23, 42, 0.14);
      pointer-events: none;
    }

    .overlay-shell-video {
      background: #000;
      border-radius: 0;
      box-shadow:
        0 20px 34px rgba(15, 23, 42, 0.24),
        0 8px 14px rgba(15, 23, 42, 0.16);
      pointer-events: auto;
    }

    .overlay-image {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      object-position: 50% 50%;
      pointer-events: none;
      user-select: none;
    }

    .overlay-shell-video iframe,
    .overlay-shell-video video {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: transparent;
      pointer-events: auto;
    }

    .overlay-shell-video-link {
      position: relative;
      background: #0f172a center center / cover no-repeat;
      text-decoration: none;
      color: #fff;
      pointer-events: auto;
    }

    .overlay-shell-video-link::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(15, 23, 42, 0.16) 0%, rgba(15, 23, 42, 0.5) 100%);
    }

    .video-link-inner {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
    }

    .video-link-pill {
      width: 92px;
      height: 92px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.92);
      box-shadow:
        0 12px 30px rgba(15, 23, 42, 0.25),
        0 2px 10px rgba(15, 23, 42, 0.16);
      margin: 0 auto 18px;
    }

    .video-link-pill::before {
      content: '';
      display: block;
      margin-left: 6px;
      border-style: solid;
      border-width: 17px 0 17px 28px;
      border-color: transparent transparent transparent #dc2626;
    }

    .video-link-copy {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.72);
      backdrop-filter: blur(4px);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 21px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .overlay-shell-video-link:hover .video-link-copy,
    .overlay-shell-video-link:focus-visible .video-link-copy {
      background: rgba(15, 23, 42, 0.84);
    }

    .overlay-link {
      z-index: 4;
      pointer-events: auto;
      border-radius: 0;
      background: rgba(255, 255, 255, 0);
    }

    .overlay-link:hover,
    .overlay-link:focus-visible {
      outline: 2px solid rgba(34, 68, 102, 0.72);
      outline-offset: -2px;
      background: rgba(34, 68, 102, 0.05);
    }

    .slide-number {
      position: absolute;
      right: 18px;
      bottom: 14px;
      z-index: 5;
      color: #64748b;
      font-size: 14px;
      letter-spacing: 0.04em;
      text-shadow: 0 1px 1px rgba(255, 255, 255, 0.96);
      pointer-events: none;
    }

    .controls {
      display: grid;
      grid-template-columns: auto auto auto 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px 18px 16px;
      background: var(--chrome-bg);
      border-top: 1px solid var(--chrome-line);
      backdrop-filter: blur(10px);
    }

    .btn {
      appearance: none;
      border: 1px solid var(--chrome-line);
      background: #ffffff;
      color: var(--chrome-text);
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
    }

    .btn:hover,
    .btn:focus-visible {
      border-color: rgba(34, 68, 102, 0.28);
      background: #f8fafc;
      outline: none;
    }

    .status {
      color: var(--chrome-text);
      font-size: 14px;
      white-space: nowrap;
    }

    .range {
      width: min(40vw, 440px);
    }

    .hint {
      color: var(--chrome-muted);
      font-size: 13px;
      text-align: right;
    }

    @media (max-width: 900px) {
      .controls {
        grid-template-columns: auto auto 1fr;
        grid-template-areas:
          "prev next status"
          "range range range"
          "hint hint hint";
      }

      .controls > :nth-child(1) { grid-area: prev; }
      .controls > :nth-child(2) { grid-area: next; }
      .controls > :nth-child(3) { grid-area: status; }
      .controls > :nth-child(4) { grid-area: range; width: 100%; }
      .controls > :nth-child(5) { grid-area: hint; text-align: left; }

      .viewer {
        padding-left: 10px;
        padding-right: 10px;
      }

      .stage {
        width: min(100vw, calc((100vh - 136px) * 16 / 9));
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="viewer">
      <div class="stage" id="stage">
        <div class="marp-layer" id="marpLayer">
          <div id=":$p"></div>
        </div>
        <div class="media-layer" id="mediaLayer"></div>
        <div class="slide-number" id="slideNumber"></div>
      </div>
    </div>
    <div class="controls">
      <button class="btn" id="prevBtn" type="button">Prev</button>
      <button class="btn" id="nextBtn" type="button">Next</button>
      <div class="status" id="status"></div>
      <input class="range" id="range" type="range" min="1" max="41" value="1">
      <div class="hint">Arrow keys navigate. Space / Shift+Space move. Double-click toggles fullscreen.</div>
    </div>

 data-size=\"16:9\">\n<h6 id=\"part-1-europes-first-theory-of-digital-power-5\">Part 1: Europe’s First Theory of Digital Power<\/h6>\n<h2 id=\"16---the-normative-mirage\">1.6 - The normative mirage<\/h2>\n<ul>\n<li>This is the key analytical mistake of the first European theory of digital power.<\/li>\n<li>Europe observed that firms adapted to its rules and inferred that <strong>standard-setting could compensate<\/strong> for weakness in production, compute, cloud, capital, and scale.<\/li>\n<li>Europe’s regulatory instinct also reflects a deeper <strong>social bargain<\/strong>:\n<ul>\n<li>households, workers, and citizens occupy a more protected place than in the US corporate model<\/li>\n<li>AI governance therefore carries a stronger distributive and moral charge<\/li>\n<\/ul>\n<\/li>\n<li>Governance shaped access while production, compute, and scale accumulated elsewhere.<\/li>\n<li>Europe learned how to force adaptation. It did not learned how to build the next technological wave.<\/li>\n<\/ul>\n<\/section>\n<\/foreignObject><\/svg>","overlays":[],"index":13},{"svgHtml":"<svg data-marpit-svg=\"\" viewBox=\"0 0 1280 720\"><foreignObject width=\"1280\" height=\"720\"><section id=\"11\" data-paginate=\"true\" data-background-color=\"#fff\" data-theme=\"default\" data-style=\":root {\n  --fg: #111827;\n  --muted: #4b5563;\n  --accent: #b91c1c;\n  --line: #e5e7eb;\n  --title: #224466;\n}\nsection {\n  background: #fff;\n  color: var(--fg);\n  font-family: &quot;Arial&quot;, &quot;Helvetica&quot;, sans-serif;\n  font-size: 24px;\n  padding: 52px 60px;\n  display: flex;\n  flex-direction: column;\n  justify-content: flex-start;\n}\nsection.title, section.roadmap {\n  justify-content: center;\n}\nh1, h2, h3, h5, h6 {\n  font-family: &quot;Arial&quot;, &quot;Helvetica&quot;, sans-serif;\n  letter-spacing: 0.4px;\n}\nh1, h2, h3 { color: var(--title); }\nh1 { font-size: 50px; }\nh2 { font-size: 34px; }\nh3 { font-size: 28px; }\nh6 {\n  font-size: 18px;\n  text-transform: uot;, &quot;Times&quot;, serif;\n  font-size: 18px;\n  color: var(--muted);\n  margin-top: auto;\n  margin-bottom: 4px;\n  padding-top: 6px;\n  border-top: 1px solid var(--line);\n}\nh5 + ul {\n  font-family: &quot;Times New Roman&quot;, &quot;Times&quot;, serif;\n  font-size: 18px;\n  color: var(--muted);\n  margin-top: 6px;\n}\nh5 + ul li { margin-bottom: 4px; }\nsection.group-rules h5 { margin-top: 0; }\nsection.codebig pre,\nsection.codebig code {\n  font-size: 30px;\n  line-height: 1.35;\n}\n;background-color:#fff;background-image:none;\" data-marpit-pagination-total=\"31\" data-size=\"16:9\">\n<h6 id=\"part-5-europes-actual-levers-in-2026-2\">Part 5: Europe’s Actual Levers in 2026<\/h6>\n<h2 id=\"53---alliance-power-selective-coalitions-and-strategic-hedging\">5.3 - Alliance power: selective coalitions and strategic hedging<\/h2>\n<ul>\n<li>Europe could assemble leverage through selective coalitions.<\/li>\n<li><strong>Japan<\/strong> combines semiconductor relevance, security-economy alignment, and trusted-infrastructure logic.<\/li>\n<li><strong>India<\/strong> combines market scale, digital public infrastructure, and a strong preference for strategic autonomy.<\/li>\n<li>This pushes Europe toward a recognizable middle-power strategy: diversify partners, localize some strategic capabilities, trade market access for technology, and avoid irreversible alignment with any single stack.<\/li>\n<li>Hedging here means <strong>optionality<\/strong>.<\/li>\n<li>That is why Europe’s realistic path is not full sovereignty in the autarkic sense. It is <strong>bargaining autonomy under dependence<\/strong>.<\/li>\n<\/ul>\n<\/section>\n<\/foreignObject><\/svg>","overlays":[],"index":35},{"svgHtml":"<svg data-marpit-svg=\"\" viewBox=\"0 0 1280 720\"><foreignObject width=\"1280\" height=\"720\"><section id=\"27\" data-paginate=\"true\" data-background-color=\"#fff\" data-theme=\"default\" data-style=\":root {\n  --fg: #111827;\n  --muted: #4b5563;\n  --accent: #b91c1c;\n  -  0 0 4px 0;\n}\nstrong { color: var(--accent); }\nul { margin-top: 10px; }\nli { margin-bottom: 6px; }\nblockquote {\n  border-left: 4px solid var(--accent);\n  padding-left: 12px;\n  color: var(--fg);\n  font-size: 22px;\n  font-style: italic;\n}\nh5 {\n  font-family: &quot;Times New Roman&quot;, &quot;Times&quot;, serif;\n  font-size: 18px;\n  color: var(--muted);\n  margin-top: auto;\n  margin-bottom: 4px;\n  padding-top: 6px;\n  border-top: 1px solid var(--line);\n}\nh5 + ul {\n  font-family: &quot;Times New Roman&quot;, &quot;Times&quot;, serif;\n  font-size: 18px;\n  color: var(--muted);\n  margin-top: 6px;\n}\nh5 + ul li { margin-bottom: 4px; }\nsection.group-rules h5 { margin-top: 0; }\nsection.codebig pre,\nsection.codebig code {\n  font-size: 30px;\n  line-height: 1.35;\n}\n;background-color:#fff;background-image:none;\" data-marpit-pagination-total=\"31\" data-size=\"16:9\">\n<h6 id=\"conclusion\">Conclusion<\/h6>\n<h2 id=\"final-synthesis\">Final synthesis<\/h2>\n<ul>\n<li>Europe’s digital strategy after Snowden turned law into defense and then into external influence.<\/li>\n<li>The mistake came when Europe inferred that rule-setting could indefinitely compensate for deficits in production, compute, cloud, and capital.<\/li>\n<li>Frontier AI shattered that assumption. It made sovereignty industrial again.<\/li>\n<li>Draghi forced Brussels to admit this in public and to begin reconnecting legality with capacity.<\/li>\n<li>Yet the result remains incomplete because Europe is constrained by:\n<ul>\n<li>its own social model<\/li>\n<li>institutional fragmentation<\/li>\n<li>member-state diversity<\/li>\n<li>and a more hierarchical transatlantic environment<\/li>\n<\/ul>\n<\/li>\n<li>Europe still has assets: market power, selected industrial nodes, capable of alliance-building.<\/li>\n<\/ul>\n<blockquote>\n<p>Can Europe translate partial assets into bargaining power before the world hardens further around American stack and Chinese scale?<\/p>\n<\/blockquote>   <script>
    const slides = JSON.parse(document.getElementById('slides-data').textContent);
    const marpRoot = document.getElementById(':$p');
    const mediaLayer = document.getElementById('mediaLayer');
    const slideNumber = document.getElementById('slideNumber');
    const status = document.getElementById('status');
    const range = document.getElementById('range');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const stage = document.getElementById('stage');
    const total = slides.length;

    function getInitialIndex() {
      const params = new URLSearchParams(window.location.search);
      const requested = Number(params.get('slide'));
      if (Number.isFinite(requested) && requested >= 1 && requested <= total) return requested - 1;

      const hash = Number(String(window.location.hash || '').replace('#', ''));
      if (Number.isFinite(hash) && hash >= 1 && hash <= total) return hash - 1;

      return 0;
    }

    let currentIndex = getInitialIndex();

    function clampIndex(index) {
      return Math.max(0, Math.min(total - 1, index));
    }

    function setRect(node, overlay) {
      node.style.left = overlay.left + '%';
      node.style.top = overlay.top + '%';
      node.style.width = overlay.width + '%';
      node.style.height = overlay.height + '%';
    }

    function renderMedia(overlay) {
      if (overlay.kind === 'image') {
        const shell = document.createElement('div');
        shell.className = 'overlay-shell overlay-shell-image';
        setRect(shell, overlay);

        const image = document.createElement('img');
        image.className = 'overlay-image';
        image.src = overlay.src;
        image.alt = overlay.title || '';
        if (overlay.fit) image.style.objectFit = overlay.fit;
        if (overlay.position) image.style.objectPosition = overlay.position;
        if (overlay.zoom) image.style.transform = 'scale(' + overlay.zoom + ')';
        if (overlay.origin) image.style.transformOrigin = overlay.origin;
        shell.appendChild(image);
        return shell;
      }

      if (overlay.kind === 'iframe') {
        if (window.location.protocol === 'file:' && overlay.watchHref) {
          const linkFrame = document.createElement('a');
          linkFrame.className = 'overlay-shell overlay-shell-video overlay-shell-video-link';
          linkFrame.href = overlay.watchHref;
          linkFrame.target = '_blank';
          linkFrame.rel = 'noopener noreferrer';
          linkFrame.title = overlay.title || overlay.watchLabel || 'Open video';
          if (overlay.poster) {
            linkFrame.style.backgroundImage = 'url("' + overlay.poster.replace(/"/g, '&quot;') + '")';
          }
          setRect(linkFrame, overlay);

          const inner = document.createElement('span');
          inner.className = 'video-link-inner';

          const textWrap = document.createElement('span');
          const pill = document.createElement('span');
          pill.className = 'video-link-pill';
          const copy = document.createElement('span');
          copy.className = 'video-link-copy';
          copy.textContent = overlay.watchLabel || 'Open video';
          textWrap.appendChild(pill);
          textWrap.appendChild(copy);
          inner.appendChild(textWrap);
          linkFrame.appendChild(inner);
          return linkFrame;
        }

        const frame = document.createElement('div');
        frame.className = 'overlay-shell overlay-shell-video';
        setRect(frame, overlay);
        if (overlay.poster) {
          frame.style.background = '#000 center center / cover no-repeat url("' + overlay.poster.replace(/"/g, '&quot;') + '")';
        }

        const iframe = document.createElement('iframe');
        iframe.src = overlay.src;
        iframe.title = overlay.title || 'Embedded media';
        iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
        iframe.allowFullscreen = true;
        frame.appendChild(iframe);
        return frame;
      }

      if (overlay.kind === 'video') {
        const frame = document.createElement('div');
        frame.className = 'overlay-shell overlay-shell-video';
        setRect(frame, overlay);

        const video = document.createElement('video');
        video.src = overlay.src;
        video.controls = true;
        video.preload = 'metadata';
        if (overlay.poster) video.poster = overlay.poster;
        frame.appendChild(video);
        return frame;
      }

      if (overlay.kind === 'link') {
        const link = document.createElement('a');
        link.className = 'overlay-link';
        link.href = overlay.href;
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.ariaLabel = overlay.title || 'Open linked resource';
        link.title = overlay.title || '';
        setRect(link, overlay);
        return link;
      }

      return null;
    }

    function updateLocation() {
      const slideNum = currentIndex + 1;
      try {
        history.replaceState(null, '', '#' + slideNum);
      } catch (error) {
        // Ignore URL update failures in non-standard contexts such as data URLs.
      }
    }

    function render() {
      const slide = slides[currentIndex];
      marpRoot.innerHTML = slide.svgHtml;
      mediaLayer.innerHTML = '';

      for (const overlay of slide.overlays) {
        const node = renderMedia(overlay);
        if (node) mediaLayer.appendChild(node);
      }

      const slideNum = currentIndex + 1;
      slideNumber.textContent = slideNum;
      status.textContent = 'Slide ' + slideNum + ' / ' + total;
      range.value = String(slideNum);
      updateLocation();
    }

    function goTo(index) {
      const next = clampIndex(index);
      if (next === currentIndex) return;
      currentIndex = next;
      render();
    }

    prevBtn.addEventListener('click', () => goTo(currentIndex - 1));
    nextBtn.addEventListener('click', () => goTo(currentIndex + 1));
    range.addEventListener('input', () => goTo(Number(range.value) - 1));

    window.addEventListener('keydown', (event) => {
      if (event.target && /input|textarea|select/i.test(event.target.tagName)) return;

      if (event.key === 'ArrowRight' || event.key === 'PageDown' || (event.key === ' ' && !event.shiftKey)) {
        event.preventDefault();
        goTo(currentIndex + 1);
      } else if (event.key === 'ArrowLeft' || event.key === 'PageUp' || (event.key === ' ' && event.shiftKey)) {
        event.preventDefault();
        goTo(currentIndex - 1);
      } else if (event.key === 'Home') {
        event.preventDefault();
        goTo(0);
      } else if (event.key === 'End') {
        event.preventDefault();
        goTo(total - 1);
      }
    });

    stage.addEventListener('dblclick', async (event) => {
      if (event.target && event.target.closest('.overlay-shell-video')) return;

      if (document.fullscreenElement) {
        await document.exitFullscreen();
      } else {
        await stage.requestFullscreen();
      }
    });

    window.addEventListener('hashchange', () => {
      const requested = Number(String(window.location.hash || '').replace('#', ''));
      if (Number.isFinite(requested) && requested >= 1 && requested <= total) {
        currentIndex = requested - 1;
        render();
      }
    });

    render();
  </script>
