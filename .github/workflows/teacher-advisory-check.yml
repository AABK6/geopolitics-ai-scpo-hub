name: Teacher advisory site check

on:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  advisory-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Advisory submission validation
        continue-on-error: true
        run: >
          node tests/submission-guard.mjs
          --mode=push
          --advisory=true
          --base=${{ github.event.before }}
          --head=${{ github.sha }}

      - name: Advisory site smoke check
        continue-on-error: true
        run: >
          node tests/site-smoke.mjs
          --mode=push
          --advisory=true
          --base=${{ github.event.before }}
          --head=${{ github.sha }}

      - name: Advisory summary
        run: echo "Teacher advisory checks completed. Publication is not blocked."
