name: Student submission guard

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  submission-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate project submission scope
        run: >
          node tests/submission-guard.mjs
          --mode=pull-request
          --base=${{ github.event.pull_request.base.sha }}
          --head=${{ github.event.pull_request.head.sha }}

      - name: Run project smoke check
        run: >
          node tests/site-smoke.mjs
          --mode=pull-request
          --base=${{ github.event.pull_request.base.sha }}
          --head=${{ github.event.pull_request.head.sha }}
